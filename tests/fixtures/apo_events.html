                "description": "    APO Southern Shootout II  Presented by Spud Inc.  - Hosted by Pelton Strong Haus  - In Collaboration with The Beast Sports Center & APO Carolinas    The APO Southern Shootout returns for its third installment—bigger, stronger, and more competitive than ever.    Hosted at The Beast Sports Center, this premier event continues to build on the momentum of the Iron Helix Classic and Southern Shootout I, delivering a high-energy, lifter-first competition experience. Previous editions featured a capped, intimate field of 40 lifters battling on a fast-moving platform, producing elite-level totals and an electric atmosphere from first attempt to last deadlift.    Southern Shootout II is proudly sponsored by Spud Inc and Pelton Strong Haus, bringing together top-tier equipment, experienced meet execution, and a culture built around serious strength. In collaboration with APO Carolinas, this meet represents a continued push to elevate APO competition across the Southeast.    Lifters can expect:  - A professionally run, efficient meet with experienced spotters/loaders and meet-day staff  - A competitive, high-intensity environment designed for big lifts and PRs  - Top-tier equipment and a platform built for performance  - A capped roster to ensure a smooth, lifter-focused experience  - Awards and prize incentives made possible through sponsor support (More key sponsors to be announced!)    Whether you’re chasing records, qualifying totals, or stepping on the platform for the first time, the Southern Shootout is built to showcase strength at every level.    Spots are limited and will go fast - secure your place and be part of one of the Southeast’s fastest-growing powerlifting meets.",

                "performer": "",
                "description": "MADD MIKE LIVES – SUMMER MEET    After a courageous two-year battle, we lost Meesh’s brother, Michael, to stage 4 non-smoking lung cancer in December 2024. But his story, his strength, and his spirit are far from over.    Michael wasn’t just family—he was the spark. His introduction to powerlifting is what inspired Meesh to step onto the platform in the first place. From day one, he was one of our biggest supporters—cheering louder, believing harder, and showing up in every way that mattered.    In his honor, we’ve renamed our summer meet:    MADD MIKE LIVES    “Madd Mike” was a nickname born on the football field back in his high school days—a name that stuck because of the intensity, passion, and heart he brought to everything he did. When he began sharing his diagnosis, he created the hashtag #MaddMikeLives—a statement, not just a phrase. A mindset. A fight.    The logo and colors for this year’s meet come directly from that journey. Designed by one of his closest friends, this was the same logo Michael wore proudly to every treatment during his first clinical trial. It represents resilience, brotherhood, and the refusal to back down.    This meet is more than just numbers on the board.    It’s about showing up.  It’s about lifting for something bigger than yourself.  It’s about honoring those we’ve lost, those still fighting, and the strength we carry because of them.    So whether you’re chasing a PR, stepping on the platform for the first time, or lifting in memory of someone you love—this is your moment.    Join us. Register. Compete. Remember.    Let’s pack the platform, bring the energy, and make sure one thing is clear:    Madd Mike Lives.    ",
